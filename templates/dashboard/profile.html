{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Your Profile</h2>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Profile Information</h5>
            <p><strong>Username:</strong> {{ user.username }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Member since:</strong> {{ user.date_joined|date:"M d, Y" }}</p>
        </div>
    </div>
</div>
{% endblock %}
