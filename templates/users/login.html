{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <!-- Cute Header -->
            <div class="text-center mb-4">
                <img src="{% static 'images/baymax2.png' %}" alt="Baymax" style="height: 80px;" class="mb-3">
                <h3 class="fw-bold" style="color: #FF6B6B;">Welcome Back! 👋</h3>
                <p class="text-muted">Hello, I'm Baymax! Ready to continue your health journey?</p>
            </div>

            <!-- Simple Login Card -->
            <div class="card shadow-sm border-0" style="border-radius: 20px; background: #f8f9fa;">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-user text-primary"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0" 
                                       placeholder="your_username" required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-lock text-primary"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0" 
                                       placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" 
                                style="border-radius: 15px; background: #FF6B6B; border: none;">
                            <i class="fas fa-heart me-2"></i>Login
                        </button>
                    </form>

                    <!-- Register Link -->
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            New here? 
                            <a href="{% url 'users:register' %}" class="text-decoration-none" style="color: #FF6B6B;">
                                Create account
                            </a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .input-group-text, .form-control {
        border-radius: 10px !important;
    }
    .card {
        border: 2px solid rgba(255, 107, 107, 0.1);
    }
</style>
{% endblock %}
