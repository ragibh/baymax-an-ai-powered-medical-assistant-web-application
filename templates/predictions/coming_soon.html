{% extends 'base.html' %}

{% block title %}{{ title }} — Blobax{% endblock %}

{% block content %}
<div class="bx-page">
    <div class="container">
        <div class="bx-coming-soon-hero bx-reveal">
            <p class="bx-eyebrow"><a href="{% url 'predictions:home' %}" class="text-decoration-none">← Predictions</a></p>
            <div class="icon-wrap"><i class="fas {{ icon }}"></i></div>
            <h1 class="bx-title h3">{{ title }}</h1>
            <p class="text-muted">{{ description }}</p>
            <span class="bx-badge-ml mt-2 d-inline-block">ML model — integrate in predictions/views.py</span>
            <div class="mt-4 d-flex gap-2 justify-content-center flex-wrap">
                <a href="{% url 'predictions:bmi' %}" class="bx-btn bx-btn-primary">Use BMI (live)</a>
                <a href="{% url 'predictions:home' %}" class="bx-btn bx-btn-outline">All predictions</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
